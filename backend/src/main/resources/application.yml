spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    # PostgreSQL cho Railway (mặc định)
    # Railway tự động cung cấp DATABASE_URL hoặc có thể dùng PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
    # Nếu DATABASE_URL không có, sẽ build từ PGHOST, PGPORT, PGDATABASE
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/railway?sslmode=disable}
    username: ${DB_USERNAME:${PGUSER:}}
    password: ${DB_PASSWORD:${PGPASSWORD:}}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        # PostgreSQL dialect cho Railway (mặc định)
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
          implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        connection:
          characterEncoding: UTF-8
          useUnicode: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true
        temp:
          use_jdbc_metadata_defaults: false
  sql:
    init:
      mode: never

  # Email Configuration
  # Lưu ý: Railway có thể block port 587, thử port 465 (SSL) nếu 587 không hoạt động
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:465}  # Thử port 465 (SSL) thay vì 587 (STARTTLS) nếu Railway block
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          # Timeout settings để tránh lỗi timeout 3000ms
          # Tăng timeout lên 30 giây để đảm bảo kết nối từ Railway đến Gmail có đủ thời gian
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:30000}  # 30 giây
          timeout: ${MAIL_SMTP_TIMEOUT:30000}  # 30 giây
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:30000}  # 30 giây
          # Bật debug để xem log chi tiết khi gửi email
          debug: ${MAIL_DEBUG:true}  # Bật debug để troubleshoot

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    whitelabel:
      enabled: false
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: true

logging:
  level:
    '[com.example.backend]': ${LOG_LEVEL:DEBUG}
    '[org.springframework.web]': ${LOG_LEVEL:DEBUG}
    '[org.hibernate.SQL]': ${HIBERNATE_LOG:DEBUG}
    '[org.hibernate.type.descriptor.sql.BasicBinder]': ${HIBERNATE_LOG:TRACE}

# PayOS Configuration
payos:
  client-id: ${PAYOS_CLIENT_ID:}
  api-key: ${PAYOS_API_KEY:}
  checksum-key: ${PAYOS_CHECKSUM_KEY:}
  base-url: ${PAYOS_BASE_URL:https://api-merchant.payos.vn}
  return-url: ${PAYOS_RETURN_URL:http://localhost:3000/payment/success}
  cancel-url: ${PAYOS_CANCEL_URL:http://localhost:3000/payment/cancel}
  webhook-url: ${PAYOS_WEBHOOK_URL:http://localhost:8080/api/payments/webhook}
  log-level: ${PAYOS_LOG_LEVEL:INFO}

# Google Gemini Configuration
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
  model: ${GEMINI_MODEL:gemini-2.0-flash}

