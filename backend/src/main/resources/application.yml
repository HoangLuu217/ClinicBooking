spring:
  datasource:
    url: ${DATABASE_URL:jdbc:sqlserver://localhost:1433;databaseName=CLINIC;encrypt=false;characterEncoding=UTF-8;sendStringParametersAsUnicode=true;useUnicode=true;responseBuffering=adaptive}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:123}
    driver-class-name: ${DB_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.SQLServerDialect}
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
          implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        connection:
          characterEncoding: UTF-8
          useUnicode: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true
        temp:
          use_jdbc_metadata_defaults: false
  sql:
    init:
      mode: never

  # Email Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:tungdtde180564@fpt.edu.vn}
    password: ${MAIL_PASSWORD:uoet gajv wcsr slqb}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          # Timeout settings để tránh lỗi timeout 3000ms
          # Tăng timeout lên 30 giây để đảm bảo kết nối từ Railway đến Gmail có đủ thời gian
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:30000}  # 30 giây
          timeout: ${MAIL_SMTP_TIMEOUT:30000}  # 30 giây
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:30000}  # 30 giây
          # Bật debug để xem log chi tiết khi gửi email
          debug: ${MAIL_DEBUG:true}  # Bật debug để troubleshoot

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    '[com.example.backend]': ${LOG_LEVEL:DEBUG}
    '[org.springframework.web]': ${LOG_LEVEL:DEBUG}
    '[org.hibernate.SQL]': ${HIBERNATE_LOG:DEBUG}
    '[org.hibernate.type.descriptor.sql.BasicBinder]': ${HIBERNATE_LOG:TRACE}

